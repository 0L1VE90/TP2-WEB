<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exercice 1 - Analyse de Zoning</title>
    <style>
        .box { border: 2px solid black; margin: 10px; padding: 20px; text-align: center; background: #f0f0f0; }
        .article-container { border: 2px dashed red; padding: 10px; }
        header { height: 60px; }
        nav { height: 40px; }
        footer { height: 40px; }
    </style>
</head>
<body>
    <header class="box">&lt;header&gt; : En-tête du site</header>
    <nav class="box">&lt;nav&gt; : Barre de navigation</nav>
    <section class="box article-container">
        &lt;section&gt; ou &lt;main&gt; : Conteneur principal
        <article class="box">&lt;article&gt; : Contenu de l'exercice</article>
    </section>
    <footer class="box">&lt;footer&gt; : Pied de page</footer>
</body>
</html>
